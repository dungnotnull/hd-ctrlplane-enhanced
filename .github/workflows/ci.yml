name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${}{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${}{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run tests
        run: |
          pytest tests/test_agent.py -v --tb=short --cov=agent --cov=tools --cov-report=term-missing
        env:
          CTRLPLANE_URL: http://localhost:3000
          CTRLPLANE_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ctrlplane-enhanced:test .
